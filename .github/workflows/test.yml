name: Run Tests
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.17.0'
      - run: npm ci
      - run: npm run lint
      - run: NODE_ENV=test npm test
        env:
          YC_REGION: ${{ secrets.YC_REGION }}
          YC_S3_BUCKET: ${{ secrets.YC_S3_BUCKET }}
          YC_S3_ACCESS_KEY: ${{ secrets.YC_S3_ACCESS_KEY }}
          YC_S3_SECRET_ACCESS_KEY: ${{ secrets.YC_S3_SECRET_ACCESS_KEY }}
          BLOB_STORE_ID: ${{ secrets.VERCEL_BLOB_STORE_ID }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.VERCEL_BLOB_READ_WRITE_TOKEN }}
